spring:
  ai:
    dashscope:
      api-key: ${DASHSCOPE_API_KEY}
    ollama:
      base-url: http://localhost:11434

  application:
    name: zhu-ai-agent
  profiles:
    active: local


#启动配置
server:
  port: 8123
  servlet:
    context-path: /api


# springdoc-openapi config
springdoc:
  swagger-ui:
    path: /swagger-ui.html
    tags-sorter: alpha
    operations-sorter: alpha
  api-docs:
    path: /v3/api-docs
  group-configs:
    - group: 'default'
      paths-to-match: '/**'
      packages-to-scan: com.zhubao.zhuaiagent.controller
# knife4j config
knife4j:
  enable: true
  setting:
    language: zh_cn
